version: "3.9"

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - frontend
      - backend

  # fastapi, horizontal
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./certs:/app/certs:ro # aiven Kafka SSL certificates
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 2 # override with --scale api=N

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./certs:/app/certs:ro # same Aiven Kafka SSL certificates
    restart: unless-stopped
    networks:
      - backend
    deploy:
      replicas: 3 # override with --scale worker=N
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

networks:
  frontend:
  backend:
